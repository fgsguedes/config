[[mgr.prepend_keymap]]
on = "e"
run = "arrow -1"
desc = "Move cursor up"

[[mgr.prepend_keymap]]
on = "n"
run = "arrow 1"
desc = "Move cursor down"

[[mgr.prepend_keymap]]
on = "h"
run = "leave"
desc = "Go back to the parent directory"

[[mgr.prepend_keymap]]
on = "i"
run = "enter"
desc = "Enter the child directory"
